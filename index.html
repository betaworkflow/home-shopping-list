<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ของใช้ในบ้าน</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  /* ===== ดีไซน์มินิมอล เน้นพื้นที่ว่าง ไอคอนเส้นสีน้ำเงินเข้ม ===== */
  :root{ --navy:#1F3864; --ink:#222; --line:#E3E6EC; --bg:#FFFFFF; --muted:#8A93A3; --soft:#F5F7FA; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; font-family:"Sukhumvit Set","Helvetica Neue",Arial,"Noto Sans Thai",sans-serif;
        color:var(--ink); background:var(--bg); font-size:16px; }
  header{ display:flex; align-items:center; gap:10px; padding:16px; border-bottom:1px solid var(--line); }
  header .back{ cursor:pointer; display:none; }
  header h1{ font-size:18px; margin:0; font-weight:600; }
  header .who{ margin-left:auto; font-size:13px; color:var(--muted); }
  main{ padding:16px; max-width:560px; margin:0 auto; }
  .hidden{ display:none !important; }

  /* เมนู 4 ช่องเท่าๆ กัน */
  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .tile{ border:1.5px solid var(--line); border-radius:16px; padding:22px 14px; text-align:center;
         cursor:pointer; transition:.15s; background:var(--bg); }
  .tile:active{ background:var(--soft); }
  .tile svg{ width:38px; height:38px; stroke:var(--navy); fill:none; stroke-width:1.6; }
  .tile span{ display:block; margin-top:10px; font-weight:600; font-size:15px; }
  .tile small{ color:var(--muted); font-weight:400; }

  /* รายการ / การ์ด */
  .row{ display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--line); }
  .row .name{ flex:1; }
  .row .name b{ font-weight:600; }
  .row .name small{ display:block; color:var(--muted); font-size:12px; margin-top:2px; }
  .chips{ display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; }
  .chip{ font-size:11px; color:var(--navy); border:1px solid var(--line); border-radius:20px; padding:2px 9px; }
  .chip.filter{ font-size:13px; padding:6px 14px; cursor:pointer; user-select:none; }
  .chip.filter.active{ background:var(--navy); color:#fff; border-color:var(--navy); }
  #catFilter{ margin:4px 0 14px; }

  /* ปุ่ม +/- จำนวน */
  .stepper{ display:flex; align-items:center; gap:8px; }
  .stepper button{ width:32px; height:32px; border:1.5px solid var(--navy); color:var(--navy);
        background:var(--bg); border-radius:50%; font-size:18px; line-height:1; cursor:pointer; }
  .stepper .q{ min-width:42px; text-align:center; font-weight:600; }
  .stepper .unit{ color:var(--muted); font-size:13px; min-width:34px; }

  .check{ width:22px; height:22px; accent-color:var(--navy); }

  /* ปุ่มหลัก */
  .btn{ display:block; width:100%; padding:14px; border:none; border-radius:12px; background:var(--navy);
        color:#fff; font-size:16px; font-weight:600; cursor:pointer; margin-top:18px; }
  .btn.ghost{ background:var(--bg); color:var(--navy); border:1.5px solid var(--navy); }
  .btn:disabled{ opacity:.4; }
  .btn-sm{ padding:8px 12px; border-radius:9px; font-size:14px; border:1.5px solid var(--navy);
        background:var(--bg); color:var(--navy); font-weight:600; cursor:pointer; }
  .btn-sm.solid{ background:var(--navy); color:#fff; }

  .sub{ color:var(--muted); font-size:13px; margin:6px 0 14px; }
  .group-title{ font-weight:700; color:var(--navy); margin:20px 0 6px; font-size:14px; }
  input[type=text], input[type=number], select{ width:100%; padding:11px; border:1.5px solid var(--line);
        border-radius:10px; font-size:15px; font-family:inherit; }
  label.cb{ display:inline-flex; align-items:center; gap:6px; margin:4px 10px 4px 0; font-size:14px; }
  .field{ margin:10px 0; }
  .field > label{ font-size:13px; color:var(--muted); display:block; margin-bottom:4px; }
  .empty{ text-align:center; color:var(--muted); padding:40px 0; }
  .toast{ position:fixed; left:50%; bottom:24px; transform:translateX(-50%); background:#222; color:#fff;
        padding:10px 18px; border-radius:24px; font-size:14px; opacity:0; transition:.2s; pointer-events:none; }
  .toast.show{ opacity:.95; }
  pre.forward{ white-space:pre-wrap; background:var(--soft); border-radius:10px; padding:12px; font-size:14px;
        font-family:inherit; border:1px solid var(--line); }
</style>
</head>
<body>

<header>
  <span class="back" id="backBtn" onclick="goHome()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1F3864" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
  </span>
  <h1 id="title">ของใช้ในบ้าน</h1>
  <span class="who" id="who"></span>
</header>

<main id="app"><div class="empty">กำลังโหลด…</div></main>
<div class="toast" id="toast"></div>

<script>
// ===================================================================
// ⚙️ CONFIG — ✏️ เติมค่าของคุณ
// ===================================================================
const LIFF_ID = '2010467321-NTjw5QPO';                       // LIFF ID จาก LINE Developers
const API_URL = 'https://script.google.com/macros/s/AKfycby-6Wbi_5pYZ-5NQ28CveFYXoifiTr1qNXOaSLgVSTAM41ufdTliOTJao0PrZbD0LCg6w/exec';        // URL เว็บแอป Apps Script (ลงท้าย /exec)

// 👇 ถ้ายังไม่ได้ใส่ LIFF_ID จริง → รัน "โหมดเดโม" อัตโนมัติ (เปิดในเบราว์เซอร์ปกติเพื่อดูหน้าตาได้ ไม่ต้องมี LINE)
const DEMO = (LIFF_ID === 'PLACEHOLDER_LIFF_ID');

// ===================================================================
// สถานะแอป
// ===================================================================
let ID_TOKEN = '';
let BOOT = null;          // { role, name, perm, master[], categories[], stores[] }
const $ = (id) => document.getElementById(id);

// ===================================================================
// เริ่มต้น
// ===================================================================
async function init(){
  if(DEMO) return initDemo();
  try{
    await liff.init({ liffId: LIFF_ID });
    if(!liff.isLoggedIn()){ liff.login(); return; }
    ID_TOKEN = liff.getIDToken();
    BOOT = await apiGet('bootstrap');
    if(!BOOT || !BOOT.ok){
      $('app').innerHTML = '<div class="empty">ยังไม่ได้ลงทะเบียนใช้งาน<br><br>'+
        'ทักบอทในแชตเพื่อรับ userId แล้วให้เจ้าบ้านเพิ่มในแท็บ "สมาชิก"</div>';
      return;
    }
    $('who').textContent = BOOT.name + ' · ' + BOOT.role;
    routeFromUrl();
  }catch(e){
    $('app').innerHTML = '<div class="empty">เปิดไม่สำเร็จ: '+e+'</div>';
  }
}

// ===================================================================
// เรียก API ไป Apps Script
//  - GET ใช้อ่าน, POST ใช้เขียน (ส่ง id_token ไปยืนยันตัวทุกครั้ง)
//  - POST ใช้ content-type text/plain เพื่อเลี่ยง CORS preflight ของ GAS
// ===================================================================
async function apiGet(action, params={}){
  if(DEMO) return demoApi(action);
  const q = new URLSearchParams({ action, id_token:ID_TOKEN, ...params });
  const r = await fetch(API_URL + '?' + q.toString());
  return r.json();
}
async function apiPost(action, body={}){
  if(DEMO) return demoApi(action, body);
  const r = await fetch(API_URL, {
    method:'POST',
    headers:{ 'Content-Type':'text/plain;charset=utf-8' },
    body: JSON.stringify({ action, id_token:ID_TOKEN, ...body })
  });
  return r.json();
}

// ===================================================================
// นำทาง
// ===================================================================
function setView(title, withBack){
  $('title').textContent = title;
  $('backBtn').style.display = withBack ? 'inline' : 'none';
  window.scrollTo(0,0);
}

function goHome(){
  setView('ของใช้ในบ้าน', false);
  const p = BOOT.perm;
  const tiles = [
    p.add     && tile('add','เพิ่มของ','ของชำ/ของซ้ำ', iconCart),
    p.order   && tile('order','สั่งของ','เลือก+ส่งร้าน', iconSend),
    p.receive && tile('receive','รับของ','ของมาส่งแล้ว', iconBox),
    p.view    && tile('history','รายการที่สั่ง','ดูที่สั่งไปแล้ว', iconList),
  ].filter(Boolean).join('');
  $('app').innerHTML = '<div class="grid">'+tiles+'</div>';
}
function tile(view,label,desc,icon){
  return `<div class="tile" onclick="open_${view}()">${icon}<span>${label}<small><br>${desc}</small></span></div>`;
}
// deep-link: เปิดหน้าตรงจาก ?v= (add/order/receive/history) — ไม่มี/ไม่มีสิทธิ์ → หน้าหลัก
function routeFromUrl(){
  let route = null;
  try{
    const v = new URLSearchParams(location.search).get('v');
    const p = BOOT.perm || {};
    route = { add:p.add&&open_add, order:p.order&&open_order,
              receive:p.receive&&open_receive, history:p.view&&open_history }[v] || null;
  }catch(e){}
  if(!route){ goHome(); return; }
  // เรียกแบบ async กันไม่ให้ error เด้งกลับไป init (เปิดไม่สำเร็จ) — พังก็ตกมาหน้าหลัก
  Promise.resolve().then(route).catch(function(){ goHome(); });
}

// ===================================================================
// หน้า 1: เพิ่มของ  (ส่งด้วย liff.sendMessages ตามสัญญารูปแบบข้อความ)
// ===================================================================
let addQty = {};   // ชื่อ -> จำนวน
let ADD_CAT = '';  // หมวดที่กรองอยู่ ('' = ทั้งหมด)
function open_add(){
  setView('เพิ่มของ', true);
  addQty = {}; ADD_CAT = '';
  BOOT.master.forEach(m=>{ addQty[m.name] = 0; });
  const cats = BOOT.categories.filter(c=>c.usedWith!=='ลิงก์ออนไลน์');
  let html = '<p class="sub">ค้นหาหรือเลือกหมวด แล้วปรับจำนวน กดยืนยัน</p>';
  html += `<div class="field"><input type="text" id="addSearch" placeholder="🔍 ค้นหาสินค้า…" oninput="renderAddList()"></div>`;
  html += `<div class="chips" id="catFilter">
      <span class="chip filter active" onclick="setAddCat('',this)">ทั้งหมด</span>
      ${cats.map(c=>`<span class="chip filter" onclick="setAddCat('${esc(c.name)}',this)">${c.name}</span>`).join('')}
    </div>`;
  html += `<div id="addList"></div>`;
  html += `<button class="btn ghost" onclick="open_newItem()">+ เพิ่มสินค้าใหม่</button>`;
  html += `<button class="btn" id="addConfirm" onclick="confirmAdd(this)" disabled>ยืนยันสั่งของ</button>`;
  $('app').innerHTML = html;
  renderAddList();
}
function setAddCat(c, el){
  ADD_CAT = c;
  document.querySelectorAll('#catFilter .chip').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  renderAddList();
}
function renderAddList(){
  const term = $('addSearch') ? $('addSearch').value.trim().toLowerCase() : '';
  const items = BOOT.master.map((m,i)=>({m,i}))
    .filter(({m})=> !ADD_CAT || (m.categories||[]).includes(ADD_CAT))
    .filter(({m})=> !term || m.name.toLowerCase().includes(term));
  let html = items.length ? '' : '<div class="empty">ไม่พบสินค้า</div>';
  items.forEach(({m,i})=>{
    html += `<div class="row">
      <div class="name"><b>${m.name}</b>
        <div class="chips">${m.categories.map(c=>`<span class="chip">${c}</span>`).join('')}</div>
      </div>
      <div class="stepper">
        <button onclick="bump('${esc(m.name)}',-1,${i})">−</button>
        <span class="q" id="q${i}">${addQty[m.name]||0}</span>
        <span class="unit">${m.unit||''}</span>
        <button onclick="bump('${esc(m.name)}',1,${i})">+</button>
      </div>
      <span class="btn-sm" onclick="delMaster('${esc(m.name)}')">ลบ</span>
    </div>`;
  });
  $('addList').innerHTML = html;
}
function bump(name, d, i){
  addQty[name] = Math.max(0, (addQty[name]||0) + d);
  const el = $('q'+i); if(el) el.textContent = addQty[name];
  $('addConfirm').disabled = !Object.values(addQty).some(v=>v>0);
}
async function delMaster(name){
  if(!confirm('ลบ "'+name+'" ออกจากรายการประจำ?')) return;
  try{
    const r = await apiPost('deleteMasterItem', { name });
    if(r && r.ok){
      BOOT.master = BOOT.master.filter(m=>m.name!==name);
      delete addQty[name];
      toast('ลบแล้ว ('+(r.deleted||0)+')');
      renderAddList();
    } else { toast('ลบไม่สำเร็จ'); }
  }catch(e){ toast('ลบไม่สำเร็จ'); }
}
async function confirmAdd(btn){
  const items = Object.keys(addQty).filter(n=>addQty[n]>0).map(n=>({ name:n, qty:addQty[n] }));
  if(!items.length) return;
  const label = btn.textContent; btn.disabled = true; btn.textContent = 'กำลังเพิ่ม…';
  try{
    const r = await apiPost('addItems', { items });   // เขียนลงชีตตรง ไม่ผ่าน liff.sendMessages
    if(r && r.ok){ toast('เพิ่มเข้ารายการแล้ว ✓ ('+(r.added||items.length)+')'); goHome(); }
    else throw 0;
  }catch(e){ toast('ไม่สำเร็จ ลองใหม่'); btn.disabled=false; btn.textContent=label; }
}

// เพิ่มสินค้าใหม่เข้ารายการประจำถาวร + ใส่หมวดด้วย checkbox
function open_newItem(){
  setView('เพิ่มสินค้าใหม่', true);
  const cats = BOOT.categories.filter(c=>c.usedWith!=='ลิงก์ออนไลน์');
  $('app').innerHTML = `
    <div class="field"><label>ชื่อสินค้า</label><input type="text" id="niName" placeholder="เช่น น้ำตาลทราย"></div>
    <div class="field"><label>หน่วย</label><input type="text" id="niUnit" placeholder="เช่น ถุง"></div>
    <div class="field"><label>หมวดหมู่ (เลือกได้หลายหมวด)</label>
      <div>${cats.map(c=>`<label class="cb"><input type="checkbox" class="check niCat" value="${c.name}">${c.name}</label>`).join('')}</div>
    </div>
    <div class="field"><label>จำนวนที่จะสั่งเลย</label><input type="number" id="niQty" value="1" min="0"></div>
    <button class="btn" onclick="saveNewItem(this)">บันทึก + ใส่ในรายการสั่ง</button>`;
}
async function saveNewItem(btn){
  const name = $('niName').value.trim();
  if(!name){ toast('ใส่ชื่อสินค้า'); return; }
  if(BOOT.master.some(m=>(m.name||'').trim().toLowerCase()===name.toLowerCase())){
    toast('มีสินค้านี้อยู่แล้ว'); return;     // กันซ้ำตั้งแต่ฝั่งหน้าเว็บ
  }
  const categories = [...document.querySelectorAll('.niCat:checked')].map(c=>c.value);
  const unit = $('niUnit').value.trim();
  const qty = parseInt($('niQty').value||'0',10);
  const label = btn.textContent; btn.disabled = true; btn.textContent = 'กำลังบันทึก…';
  try{
    const r = await apiPost('addMasterItem', { name, categories, unit, qty });   // บันทึกถาวร
    if(!r || !r.ok){
      toast(r && r.error==='duplicate' ? 'มีสินค้านี้อยู่แล้ว' : 'บันทึกไม่สำเร็จ');
      btn.disabled=false; btn.textContent=label; return;
    }
    if(qty>0){ await apiPost('addItems', { items:[{ name, qty }] }); }  // เข้ากองด้วย (เขียนชีตตรง)
    BOOT.master.push({ name, categories, unit, defaultQty:qty||1 });    // อัปเดต list ในแอปทันที
    toast('บันทึกแล้ว ✓');
    goHome();
  }catch(e){ toast('บันทึกไม่สำเร็จ'); btn.disabled=false; btn.textContent=label; }
}

// ===================================================================
// หน้า 2: สั่งของ (export) — แยกของชำ / ออนไลน์
// ===================================================================
let POOL = [];
async function open_order(){
  setView('สั่งของ', true);
  $('app').innerHTML = '<div class="empty">กำลังโหลด…</div>';
  const res = await apiGet('pool');
  POOL = (res.items)||[];
  const grocery = POOL.filter(x=>x.type!=='ลิงก์ออนไลน์');
  const online  = POOL.filter(x=>x.type==='ลิงก์ออนไลน์');
  let html = '';

  // --- ของชำ: ติ๊กเลือก แล้วเลือกร้าน (กรองตามหมวด) ---
  html += '<div class="group-title">ของชำ (เลือกเพื่อสั่ง)</div>';
  if(!grocery.length){ html += '<div class="sub">ไม่มีของค้างสั่ง</div>'; }
  grocery.forEach(it=>{
    html += `<div class="row">
      <input type="checkbox" class="check poolCb" value="${it.row}" data-cats="${(it.categories||[]).join('|')}" onchange="refreshStores()">
      <div class="name"><b>${it.name}</b> <small>x${it.qty} ${it.unit||''}</small>
        <div class="chips">${(it.categories||[]).map(c=>`<span class="chip">${c}</span>`).join('')}</div>
      </div>
      <span class="btn-sm" onclick="editPool(${it.row},'${esc(it.name)}',${it.qty})">แก้</span>
    </div>`;
  });
  if(grocery.length){
    html += `<div class="field" style="margin-top:16px"><label>เลือกร้าน (โชว์เฉพาะร้านที่ขายหมวดที่เลือก)</label>
      <select id="storeSel"></select></div>
      <button class="btn ghost" onclick="open_addStore()">+ เพิ่มร้านใหม่</button>
      <button class="btn" onclick="doPlaceOrder()">สั่ง + สร้างข้อความส่งร้าน</button>`;
  }

  // --- ออนไลน์: เปิดดู / เปิดสั่ง ---
  html += '<div class="group-title">ออนไลน์</div>';
  if(!online.length){ html += '<div class="sub">ไม่มีลิงก์ค้างสั่ง</div>'; }
  online.forEach(it=>{
    html += `<div class="row">
      <div class="name"><b>${it.name}</b> <small>${it.store||''}</small></div>
      <a class="btn-sm" href="${it.link}" target="_blank" rel="noopener">เปิดดู</a>
      <span class="btn-sm solid" onclick="openAndOrder(${it.row},'${esc(it.link)}')">เปิดสั่ง</span>
    </div>`;
  });
  $('app').innerHTML = html;
  refreshStores();
}

// กรองร้านให้ตรงหมวดของที่ติ๊กเลือก
function refreshStores(){
  const sel = $('storeSel'); if(!sel) return;
  const chosen = [...document.querySelectorAll('.poolCb:checked')];
  const wantCats = new Set();
  chosen.forEach(c=> (c.dataset.cats||'').split('|').filter(Boolean).forEach(x=>wantCats.add(x)));
  let stores = BOOT.stores;
  if(wantCats.size){
    const match = stores.filter(s=> s.categories.some(c=>wantCats.has(c)));
    stores = match.length ? match : stores;   // ถ้าไม่มีร้านตรงเลย แสดงทั้งหมดกันตัน
  }
  sel.innerHTML = stores.map(s=>`<option value="${s.name}">${s.name} (${s.channel||'-'})</option>`).join('');
}

async function doPlaceOrder(){
  const rows = [...document.querySelectorAll('.poolCb:checked')].map(c=>parseInt(c.value,10));
  const store = $('storeSel').value;
  if(!rows.length){ toast('เลือกของก่อน'); return; }
  const res = await apiPost('placeOrder', { rows, store });
  if(res.ok){ showForward(res.forwardText, store); }
  else toast('สั่งไม่สำเร็จ');
}
function showForward(text, store){
  setView('สั่ง '+store, true);
  $('app').innerHTML = `<p class="sub">ก็อปข้อความนี้ส่งให้ร้าน (หรือกดแชร์ไปแชตร้าน)</p>
    <pre class="forward" id="fwd">${text}</pre>
    <button class="btn" onclick="copyFwd()">คัดลอกข้อความ</button>
    <button class="btn ghost" onclick="open_order()">กลับไปสั่งต่อ</button>`;
}
function copyFwd(){ navigator.clipboard.writeText($('fwd').textContent).then(()=>toast('คัดลอกแล้ว')); }

async function openAndOrder(row, link){
  window.open(link,'_blank','noopener');
  await apiPost('markOnlineOrdered', { row });
  toast('ทำเครื่องหมายว่าสั่งแล้ว');
  open_order();
}

// แก้/ลบของในกอง
function editPool(row,name,qty){
  setView('แก้รายการ', true);
  $('app').innerHTML = `
    <div class="field"><label>ชื่อ</label><input type="text" id="edName" value="${name}"></div>
    <div class="field"><label>จำนวน</label><input type="number" id="edQty" value="${qty}" min="1"></div>
    <button class="btn" onclick="saveEdit(${row})">บันทึก</button>
    <button class="btn ghost" onclick="delPool(${row})">ลบรายการนี้</button>
    <button class="btn ghost" onclick="open_order()">ยกเลิก</button>`;
}
async function saveEdit(row){
  await apiPost('editItem', { row, name:$('edName').value.trim(), qty:parseInt($('edQty').value,10) });
  toast('บันทึกแล้ว'); open_order();
}
async function delPool(row){
  await apiPost('deleteItem', { row }); toast('ลบแล้ว'); open_order();
}

// เพิ่มร้านใหม่ + เลือกหมวดร้าน (checkbox)
function open_addStore(){
  setView('เพิ่มร้านใหม่', true);
  const cats = BOOT.categories;
  $('app').innerHTML = `
    <div class="field"><label>ชื่อร้าน</label><input type="text" id="stName"></div>
    <div class="field"><label>ช่องทางสั่ง</label>
      <select id="stCh"><option>LINE</option><option>ออนไลน์</option><option>ไปเอง</option><option>โทร</option><option>ลิงก์</option></select></div>
    <div class="field"><label>หมวดร้าน (ขายหมวดไหนบ้าง)</label>
      <div>${cats.map(c=>`<label class="cb"><input type="checkbox" class="check stCat" value="${c.name}">${c.name}</label>`).join('')}</div></div>
    <button class="btn" onclick="saveStore()">บันทึกร้าน</button>`;
}
async function saveStore(){
  const store = $('stName').value.trim();
  if(!store){ toast('ใส่ชื่อร้าน'); return; }
  const categories = [...document.querySelectorAll('.stCat:checked')].map(c=>c.value);
  const res = await apiPost('addStore', { store, channel:$('stCh').value, categories });
  if(res.ok){ BOOT.stores.push({ name:store, channel:$('stCh').value, categories }); toast('เพิ่มร้านแล้ว'); open_order(); }
  else if(res.error==='duplicate') toast('มีร้านนี้แล้ว');
  else toast('เพิ่มไม่สำเร็จ');
}

// ===================================================================
// หน้า 3: รับของ — จัดกลุ่มตามร้าน กดรับทั้งร้าน
// ===================================================================
async function open_receive(){
  setView('รับของ', true);
  $('app').innerHTML = '<div class="empty">กำลังโหลด…</div>';
  const res = await apiGet('ordered');
  const items = res.items||[];
  if(!items.length){ $('app').innerHTML = '<div class="empty">ไม่มีของรอรับ</div>'; return; }
  const byStore = {};
  items.forEach(it=>{ const s=it.store||'(ไม่ระบุร้าน)'; (byStore[s]=byStore[s]||[]).push(it); });
  let html='<p class="sub">ติ๊กเฉพาะของที่มาส่งแล้ว แล้วกดรับ — ของที่ไม่ติ๊กจะค้างไว้รับทีหลัง</p>';
  Object.keys(byStore).forEach((store,gi)=>{
    html += `<div class="group-title">${store}</div>`;
    byStore[store].forEach(it=>{
      html += `<div class="row">
        <input type="checkbox" class="check rcv g${gi}" value="${it.row}" checked>
        <div class="name"><b>${it.name}</b> <small>x${it.qty} ${it.unit||''}</small></div>
      </div>`;
    });
    html += `<button class="btn-sm solid" style="margin-top:8px" onclick="receiveChecked(${gi},'${esc(store)}')">✓ รับของที่ติ๊ก (${store})</button>`;
  });
  $('app').innerHTML = html;
}
async function receiveChecked(gi, store){
  const rows=[...document.querySelectorAll('.rcv.g'+gi+':checked')].map(c=>parseInt(c.value,10));
  if(!rows.length){ toast('ติ๊กของที่จะรับก่อน'); return; }
  await apiPost('markReceived', { rows }); toast('รับของแล้ว '+rows.length+' รายการ'); open_receive();
}

// ===================================================================
// หน้า 4: รายการที่สั่งแล้ว (ดูอย่างเดียว)
// ===================================================================
async function open_history(){
  setView('รายการที่สั่งแล้ว', true);
  $('app').innerHTML = '<div class="empty">กำลังโหลด…</div>';
  const res = await apiGet('history');
  const items = res.items||[];
  if(!items.length){ $('app').innerHTML = '<div class="empty">ยังไม่มีรายการที่สั่ง</div>'; return; }
  // จัดกลุ่มตาม "ใบสั่ง" (ร้าน + เวลาสั่ง)
  const groups={};
  items.forEach(it=>{ const k=(it.orderedAt||'-')+'|'+(it.store||''); (groups[k]=groups[k]||{store:it.store,at:it.orderedAt,items:[]}).items.push(it); });
  const keys=Object.keys(groups).sort((a,b)=>String(groups[b].at||'').localeCompare(String(groups[a].at||'')));
  let html='';
  keys.forEach(k=>{
    const g=groups[k];
    html += `<div class="group-title">🏪 ${g.store||'(ไม่ระบุร้าน)'} <small style="color:var(--muted);font-weight:400">· สั่ง ${fmtWhen(g.at)||'—'}</small></div>`;
    g.items.forEach(it=>{
      const recv = it.status==='ได้รับแล้ว'
        ? `<small style="color:#0a8a3a">✓ รับแล้ว ${fmtWhen(it.receivedAt)||''}</small>`
        : `<small style="color:#c47a00">⏳ ยังไม่ได้รับ</small>`;
      html += `<div class="row"><div class="name"><b>${it.name}</b>
        <small>x${it.qty} ${it.unit||''}</small>${recv}</div>
        ${it.link?`<a class="btn-sm" href="${it.link}" target="_blank">ลิงก์</a>`:''}</div>`;
    });
  });
  $('app').innerHTML = html;
}
function fmtWhen(s){ if(!s||s==='-') return ''; const d=new Date(s); return isNaN(d)?'':d.toLocaleString('th-TH',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}); }
